name: Deploy Supabase (Timeweb)

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "supabase/migrations/**"
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Применить новые миграции"
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy to Timeweb
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          key: ${{ secrets.TIMEWEB_SSH_KEY }}
          port: ${{ secrets.TIMEWEB_SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/onfive

            echo "--- Pull latest code ---"
            git fetch origin main
            git reset --hard origin/main

            echo "--- Deploy Supabase ---"
            bash infra/scripts/deploy.sh

      - name: Run migrations
        if: ${{ github.event.inputs.run_migrations == 'true' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          key: ${{ secrets.TIMEWEB_SSH_KEY }}
          port: ${{ secrets.TIMEWEB_SSH_PORT || 22 }}
          script: |
            cd /opt/onfive
            bash infra/scripts/migrate.sh

      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          key: ${{ secrets.TIMEWEB_SSH_KEY }}
          port: ${{ secrets.TIMEWEB_SSH_PORT || 22 }}
          script: |
            cd /opt/onfive
            echo "--- Container status ---"
            docker compose ps
            echo "--- Postgres health ---"
            docker compose exec -T db pg_isready -U postgres
