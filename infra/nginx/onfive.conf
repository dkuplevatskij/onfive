# Nginx reverse proxy для OnFive на Timeweb
# Установка: sudo ln -s /opt/onfive/nginx/onfive.conf /etc/nginx/sites-enabled/onfive
# Сертификат: sudo certbot --nginx -d onfive.ru -d api.onfive.ru

# ─── Supabase API (api.onfive.ru) ─────────────────────────────────────────────
server {
    listen 80;
    server_name api.onfive.ru;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name api.onfive.ru;

    ssl_certificate     /etc/letsencrypt/live/api.onfive.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.onfive.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Supabase Studio — только с localhost (безопасность)
    location /studio {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    # Kong API Gateway
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (Realtime)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 52m;
    }
}

